name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Determine firmware version
        id: version
        run: |
          # Version is the build date plus the GitHub Actions run number
          VERSION="$(date -u +%Y.%m.%d).${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Set firmware version in config
        run: |
          yq -i '.substitutions.firmware_version = "${{ steps.version.outputs.version }}"' \
            music-dashboard.yaml

      - name: Build ESP Web Tools site
        run: |
          uvx ewt-gen music-dashboard.yaml \
            --title "Music Dashboard" \
            --fw-version "${{ steps.version.outputs.version }}" \
            -o _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
